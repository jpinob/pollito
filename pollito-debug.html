document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0px;margin:0 auto;padding:clamp(36px,6vw,66px) 24px 60px;\">\n    <div style=\"font-family:'Press Start 2P';font-size:10px;color:#5c6370;margin-bottom:16px;\">{{ t.blogKicker }}<\u002Fdiv>\n    <h1 style=\"font-family:'VT323';font-size:clamp(48px,8vw,84px);line-height:.86;margin:0 0 10px;color:#e6e8ee;\">{{ t.blogTitle }}<\u002Fh1>\n    <p style=\"font-size:15px;color:#a7adba;margin:0 0 38px;\">{{ t.blogLead }}<\u002Fp>\n\n    <div onclick=\"{{ featured.open }}\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:0;background:#15171e;border:2px solid #2a2e3a;box-shadow:6px 6px 0 #000;margin-bottom:26px;cursor:pointer;transition:transform .12s,box-shadow .12s;\" style-hover=\"transform:translate(-2px,-2px);box-shadow:9px 9px 0 #000;border-color:#FFD83D;\">\n      <div style=\"background:#0d0e12;display:grid;place-items:center;padding:40px;border-right:2px solid #2a2e3a;min-height:200px;background-image:radial-gradient(circle at 50% 50%,rgba(255,216,61,0.10),transparent 60%);\">\n        <div style=\"width:130px;animation:floaty 4s ease-in-out infinite;\">{{ chick }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:30px;display:flex;flex-direction:column;justify-content:center;\">\n        <span style=\"font-family:'Press Start 2P';font-size:8px;color:#0d0e12;background:#FFD83D;padding:5px 8px;align-self:flex-start;margin-bottom:16px;\">{{ featured.cat }}<\u002Fspan>\n        <h2 style=\"font-family:'VT323';font-size:clamp(32px,4vw,44px);line-height:.95;margin:0 0 12px;color:#e6e8ee;\">{{ featured.title }}<\u002Fh2>\n        <p style=\"font-size:14px;line-height:1.6;color:#a7adba;margin:0 0 16px;\">{{ featured.excerpt }}<\u002Fp>\n        <div style=\"font-size:12px;color:#5c6370;\">{{ featured.meta }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:18px;\">\n      <sc-for list=\"{{ restPosts }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <div onclick=\"{{ p.open }}\" style=\"background:#15171e;border:2px solid #2a2e3a;box-shadow:5px 5px 0 #000;padding:24px;cursor:pointer;display:flex;flex-direction:column;transition:transform .12s,box-shadow .12s;\" style-hover=\"transform:translate(-2px,-2px);box-shadow:7px 7px 0 #000;border-color:#FFD83D;\">\n          <span style=\"font-family:'Press Start 2P';font-size:8px;color:#FFD83D;border:1px solid #2a2e3a;padding:5px 7px;align-self:flex-start;margin-bottom:16px;\">{{ p.cat }}<\u002Fspan>\n          <h3 style=\"font-family:'VT323';font-size:30px;line-height:.98;margin:0 0 10px;color:#e6e8ee;\">{{ p.title }}<\u002Fh3>\n          <p style=\"font-size:13px;line-height:1.6;color:#a7adba;margin:0 0 18px;flex:1;\">{{ p.excerpt }}<\u002Fp>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:#5c6370;border-top:2px solid #2a2e3a;padding-top:14px;\"><span>{{ p.meta }}<\u002Fspan><span style=\"color:#FFD83D;\">{{ t.blogReadMore }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== ARTICLE ===================== -->\n  <sc-if value=\"{{ showArticle }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"max-width:720px;margin:0 auto;padding:clamp(30px,5vw,56px) 24px 70px;\">\n    <button onclick=\"{{ closeArticle }}\" style=\"font-family:'JetBrains Mono';font-size:13px;color:#FFD83D;background:transparent;border:2px solid #2a2e3a;padding:9px 14px;cursor:pointer;margin-bottom:30px;box-shadow:3px 3px 0 #000;transition:transform .1s,box-shadow .1s;\" style-hover=\"transform:translate(-1px,-1px);box-shadow:4px 4px 0 #000;border-color:#FFD83D;\">{{ t.blogBack }}<\u002Fbutton>\n    <span style=\"font-family:'Press Start 2P';font-size:8px;color:#0d0e12;background:#FFD83D;padding:5px 8px;display:inline-block;margin-bottom:18px;\">{{ article.cat }}<\u002Fspan>\n    <h1 style=\"font-family:'VT323';font-size:clamp(40px,6vw,68px);line-height:.9;margin:0 0 14px;color:#e6e8ee;text-wrap:balance;\">{{ article.title }}<\u002Fh1>\n    <div style=\"font-size:12.5px;color:#5c6370;margin-bottom:34px;border-bottom:2px solid #2a2e3a;padding-bottom:22px;\">{{ article.meta }}<\u002Fdiv>\n    <sc-for list=\"{{ articleBody }}\" as=\"par\" hint-placeholder-count=\"3\">\n      <p style=\"font-size:16px;line-height:1.8;color:#cfd3de;margin:0 0 22px;\">{{ par }}<\u002Fp>\n    <\u002Fsc-for>\n    <div style=\"display:flex;gap:14px;align-items:center;background:#15171e;border:2px solid #FFD83D;box-shadow:5px 5px 0 #000;padding:20px;margin-top:36px;\">\n      <div style=\"width:52px;height:52px;flex:none;\">{{ chick }}<\u002Fdiv>\n      <div style=\"flex:1;\"><p style=\"margin:0 0 12px;font-size:14px;color:#e6e8ee;line-height:1.5;\">{{ t.articleOutro }}<\u002Fp><button onclick=\"{{ goChat }}\" style=\"font-family:'JetBrains Mono';font-size:13px;font-weight:700;color:#0d0e12;background:#FFD83D;border:2px solid #FFD83D;padding:10px 16px;cursor:pointer;box-shadow:3px 3px 0 #000;\">🐤 {{ t.ctaChat }}<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <\u002Fmain>\n\n  <sc-if value=\"{{ notChat }}\" hint-placeholder-val=\"{{ true }}\">\n  <footer style=\"border-top:2px solid #2a2e3a;background:#15171e;padding:36px 24px;text-align:center;\">\n    <div style=\"width:44px;height:44px;margin:0 auto 14px;\">{{ chick }}<\u002Fdiv>\n    <div style=\"font-family:'VT323';font-size:24px;color:#FFD83D;margin-bottom:6px;\">{{ t.footerTag }}<\u002Fdiv>\n    <div style=\"font-size:11.5px;color:#5c6370;font-family:'JetBrains Mono';\">{{ t.footerNote }}<\u002Fdiv>\n  <\u002Ffooter>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { route:'home', lang:'es', messages:[], input:'', typing:false, article:null };\n\n  constructor(props){ super(props); this.msgsRef = React.createRef(); this.rot = {}; }\n\n  componentDidMount(){ this.greet(); }\n  componentDidUpdate(prevP, prevS){\n    if(this.msgsRef.current && (prevS.messages !== this.state.messages || prevS.typing !== this.state.typing)){\n      this.msgsRef.current.scrollTop = this.msgsRef.current.scrollHeight;\n    }\n  }\n\n  // ---- pixel chick (Pollito) ----\n  chickEl(){\n    const map = [\n      \"......1111......\",\n      \".....122221.....\",\n      \"....12222221....\",\n      \"...1222222221...\",\n      \"..122222222221..\",\n      \"..125622256221..\",\n      \"..125522255221..\",\n      \".12222222222221.\",\n      \".12222444422221.\",\n      \".12722444422721.\",\n      \"..122224422221..\",\n      \"..122222222221..\",\n      \"...1222222221...\",\n      \"....13333331....\",\n      \"......4..4......\",\n      \".....44...44....\"\n    ];\n    const col = {1:'#23262f',2:'#FFD83D',3:'#E9B62B',4:'#F08C1E',5:'#16181d',6:'#ffffff',7:'#FF9E7A'};\n    const rects = [];\n    map.forEach((row,y)=>{ for(let x=0;x<row.length;x++){ const c=row[x]; if(col[c]) rects.push(React.createElement('rect',{key:x+'_'+y,x:x,y:y,width:1.02,height:1.02,fill:col[c]})); } });\n    return React.createElement('svg',{viewBox:'0 0 16 16',width:'100%',height:'100%',shapeRendering:'crispEdges',style:{display:'block',filter:'drop-shadow(3px 4px 0 rgba(0,0,0,0.4))'}},rects);\n  }\n\n  // ---- chat engine ----\n  greet(){ this.setState({ messages:[{ from:'duck', text:this.banks()[this.state.lang].greet }] }); }\n\n  banks(){\n    return {\n      es:{\n        greet:\"¡Hola caserito! 🐤 Soy Pollito, tu patito debugger boliviano. Contame tu bug despacito, línea por línea… vas a ver que lo encontrás solito.\",\n        hi:[\"¡Elay, hola pues! ¿En qué andamos atorados hoy, jovencito?\",\"¡Qué tal caserito! Sentate nomás y contame tu problema, con confianza.\"],\n        socratic:[\n          \"A ver caserito, explicame línea por línea qué hace tu código. Sin saltarte nada, ¿ya?\",\n          \"¿Y qué esperabas que pasara justo ahí, pues? Contame con tus propias palabras.\",\n          \"Mmm… ¿estás bien seguro que esa variable tiene lo que vos creés? Revisá nomás.\",\n          \"Elay, ¿y antes funcionaba? ¿Qué le cambiaste últimamente, jovencito?\",\n          \"Despacito pe. ¿Qué dice EXACTO el error? Leémelo tal cual, sin resumir.\",\n          \"¿Ya probaste imprimir ese valor antes de que truene? Un console.log nunca está de más, casero.\",\n          \"¿Y esa función de verdad devuelve lo que creés… o nomás suponés, pues?\",\n          \"Seguí, seguí… ¿y qué pasa en la línea siguiente? No te frenes ahorita.\"\n        ],\n        bug:[\n          \"Uh, un bug. Tranqui nomás. Empecemos: ¿en qué línea exacta explota la cosa?\",\n          \"A ver ese error… leémelo palabra por palabra. A veces ahí nomás está la respuesta, casero.\",\n          \"¿Es error de sintaxis o de lógica? O sea, ¿el código corre y hace mal, o ni arranca?\",\n          \"¿Reproducís el bug siempre, o solo a veces? Eso cambia harto el cuento, pues.\"\n        ],\n        frust:[\n          \"Calma caserito… hasta los mejores se traban. Respirá hondo. Ahora contame de nuevo, despacito.\",\n          \"Ni modo pe, así es la programación. Tomate un apicito ☕ y volvemos con fuerza. Vos podés.\",\n          \"Tranquilo jovencito, no te rindás. Un bug a la vez. ¿Cuál es lo ÚLTIMO que sí funcionaba?\"\n        ],\n        solved:[\n          \"¡ELAY PUEJ! 🎉 ¿Viste? Yo solo te escuché… vos lo resolviste solito. Anótate esa, jovencito.\",\n          \"¡Eso pues, caserito! La magia del patito: explicar en voz alta y zás, aparece el error. Bien hecho.\",\n          \"¡Jallalla! Resuelto. Ahora andá a celebrar con una salteña que te la ganaste.\"\n        ],\n        thanks:[\n          \"De nada nomás, para eso estamos los patitos. Cuando quieras volvés, caserito.\",\n          \"Tranqui pe, siempre a la orden. Chau, y que no te muerdan los bugs 🐤\"\n        ]\n      },\n      en:{\n        greet:\"Hey caserito! 🐤 I'm Pollito, your Bolivian debugger duck. Tell me your bug slowly, line by line… you'll find it yourself, you'll see.\",\n        hi:[\"Elay, hello pues! What are we stuck on today, jovencito?\",\"What's up, caserito! Sit down and tell me your problem, con confianza.\"],\n        socratic:[\n          \"Alright caserito, walk me through your code line by line. Don't skip anything, ¿ya?\",\n          \"And what did you EXPECT to happen right there, pues? Tell me in your own words.\",\n          \"Hmm… are you really sure that variable holds what you think? Go check, nomás.\",\n          \"Elay, did it work before? What did you change last, jovencito?\",\n          \"Slow down, pe. What does the error say EXACTLY? Read it to me word for word.\",\n          \"Did you try printing that value before it crashes? A console.log never hurts, casero.\",\n          \"Does that function really return what you think… or are you just guessing, pues?\",\n          \"Keep going… what happens on the next line? Don't stop now, jovencito.\"\n        ],\n        bug:[\n          \"Uh oh, a bug. Tranqui nomás. First: on which exact line does it blow up?\",\n          \"Let's see that error… read it to me word for word. The answer's often right there, casero.\",\n          \"Is it a syntax error or a logic one? Does the code run and misbehave, or not run at all?\",\n          \"Does it happen every time, or only sometimes? That changes the story a lot, pues.\"\n        ],\n        frust:[\n          \"Easy, caserito… even the best get stuck. Breathe. Now tell me again, slowly.\",\n          \"Ni modo, pe — that's coding for you. Grab an api ☕ and we'll come back strong. You got this.\",\n          \"Don't give up, jovencito. One bug at a time. What's the LAST thing that actually worked?\"\n        ],\n        solved:[\n          \"ELAY PUEJ! 🎉 See? I just listened… YOU solved it. Chalk one up, jovencito.\",\n          \"That's it, caserito! Duck magic: say it out loud and bam, the bug appears. Well done.\",\n          \"Jallalla! Solved. Now go celebrate with a salteña — you earned it.\"\n        ],\n        thanks:[\n          \"You're welcome, that's what us ducks are for. Come back anytime, caserito.\",\n          \"No worries, pe — always here. Chau, and may the bugs not bite 🐤\"\n        ]\n      },\n      sv:{\n        greet:\"Hej caserito! 🐤 Jag är Pollito, din bolivianska debug-anka. Berätta om din bugg långsamt, rad för rad… du kommer hitta den själv, ska du se.\",\n        hi:[\"Elay, hej pues! Vad har vi fastnat på idag, jovencito?\",\"Tjena caserito! Slå dig ner och berätta om ditt problem, med förtroende.\"],\n        socratic:[\n          \"Okej caserito, gå igenom din kod rad för rad. Hoppa inte över nåt, ¿ya?\",\n          \"Och vad FÖRVÄNTADE du dig skulle hända just där, pues? Berätta med egna ord.\",\n          \"Hmm… är du säker på att den variabeln innehåller det du tror? Kolla efter, nomás.\",\n          \"Elay, fungerade det förut? Vad ändrade du senast, jovencito?\",\n          \"Lugn, pe. Vad står det EXAKT i felet? Läs det ordagrant för mig.\",\n          \"Provade du skriva ut värdet innan det kraschar? En console.log skadar aldrig, casero.\",\n          \"Returnerar funktionen verkligen det du tror… eller gissar du bara, pues?\",\n          \"Fortsätt… vad händer på nästa rad? Stanna inte nu, jovencito.\"\n        ],\n        bug:[\n          \"Oj, en bugg. Tranqui nomás. Först: på vilken exakt rad smäller det?\",\n          \"Få se felet… läs det ordagrant. Svaret finns ofta precis där, casero.\",\n          \"Är det ett syntaxfel eller ett logikfel? Körs koden men gör fel, eller startar den inte alls?\",\n          \"Händer det varje gång, eller bara ibland? Det ändrar historien rätt mycket, pues.\"\n        ],\n        frust:[\n          \"Lugn, caserito… även de bästa fastnar. Andas. Berätta igen, långsamt.\",\n          \"Ni modo, pe — så är det med kodning. Ta en api ☕ så kommer vi tillbaka starka. Du fixar det.\",\n          \"Ge inte upp, jovencito. En bugg i taget. Vad är det SISTA som faktiskt fungerade?\"\n        ],\n        solved:[\n          \"ELAY PUEJ! 🎉 Ser du? Jag bara lyssnade… DU löste det. Notera den, jovencito.\",\n          \"Där har vi det, caserito! Ankmagi: säg det högt och pang, buggen dyker upp. Bra jobbat.\",\n          \"Jallalla! Löst. Gå och fira med en salteña — du förtjänar den.\"\n        ],\n        thanks:[\n          \"Varsågod, det är vad vi ankor är till för. Kom tillbaka när du vill, caserito.\",\n          \"Inga problem, pe — alltid här. Chau, och må buggarna inte bitas 🐤\"\n        ]\n      }\n    };\n  }\n\n  classify(text){\n    const s = text.toLowerCase();\n    if(/(gracias|thank|thx)/.test(s)) return 'thanks';\n    if(/(funciona ya|ya funciona|resuelto|resolv[ií]|lo encontr|ya est[aá]|solved|fixed|works now|it works|found it)/.test(s)) return 'solved';\n    if(/(^hola|^hey|^hi\\b|^hello|buenas|qu[eé] tal|saludos)/.test(s)) return 'hi';\n    if(/(no s[eé]|ayud|me rindo|odio|imposible|stuck|atorad|atasc|\\bhelp\\b|give up|frustr|cansad|tired|harto)/.test(s)) return 'frust';\n    if(/(bug|error|undefined|null|crash|falla|no corre|no funciona|no jala|exception|\\bnan\\b|broken|roto|trona|segfault)/.test(s)) return 'bug';\n    return 'socratic';\n  }\n\n  pick(cat){\n    const arr = this.banks()[this.state.lang][cat];\n    const i = (this.rot[cat]||0) % arr.length;\n    this.rot[cat] = i+1;\n    return arr[i];\n  }\n\n  userSend(text){\n    const t = (text||'').trim();\n    if(!t || this.state.typing) return;\n    this.setState(s=>({ messages:[...s.messages, {from:'user', text:t}], input:'', typing:true }));\n    const cat = this.classify(t);\n    setTimeout(()=>{\n      this.setState(s=>({ messages:[...s.messages, {from:'duck', text:this.pick(cat)}], typing:false }));\n    }, 750 + Math.random()*750);\n  }\n\n  // ---- content ----\n  data(){\n    const D = {\n      es:{\n        nav:{home:'Inicio', what:'¿Qué es?', chat:'Pollito', blog:'Blog'},\n        heroKicker:'// rubber_duck_debugging.exe',\n        heroTitleA:'Explícale tu bug a ', heroTitleB:'Pollito.',\n        heroSub:'El patito debugger más paciente de Bolivia. Le contás tu código línea por línea… y de repente, elay, encontrás el error solito. Sin juicios, sin apuro, con harto cariño.',\n        ctaChat:'Hablar con Pollito', ctaWhat:'¿Qué es esto?',\n        heroBubble:'— ¿Y luego qué pasa, pues?',\n        statsLine:'0 dependencias · 100% escucha · ∞ paciencia',\n        howKicker:'// cómo_funciona()', howTitle:'Tres pasos. Cero magia.', howSub:'(bueno… un poquito de magia)',\n        steps:[\n          {k:'01',t:'Contale tu problema',d:'Abrí el chat y saludá a Pollito. Siempre en línea, modo escucha activado.'},\n          {k:'02',t:'Explicá línea por línea',d:'Leele tu código en voz alta, despacito. Pollito te pregunta como buen caserito curioso.'},\n          {k:'03',t:'Encontrá el bug solito',d:'En algún momento te vas a frenar y… ¡elay! Ahí estaba. Pollito sonríe. Vos también.'}\n        ],\n        featKicker:'// por_qué_funciona', featTitle:'Un debugger que no te apura', featSub:'Pollito no te da la respuesta. Te ayuda a encontrarla.',\n        features:[\n          {i:'<\u002F>',t:'Habla tu idioma',d:'Explicale en español, en inglés o en puro spanglish. Pollito te entiende, caserito.'},\n          {i:'{ }',t:'Cero juicios',d:'No importa lo feo que esté tu código. Pollito ya lo vio todo y nunca se ríe… casi nunca.'},\n          {i:'[ ]',t:'Método socrático',d:'Preguntas que te hacen pensar, no respuestas masticadas que después no aprendés.'},\n          {i:'$_',t:'Siempre disponible',d:'3 de la mañana, deadline encima, café frío. Pollito sigue ahí, con la misma paciencia.'},\n          {i:'λ',t:'Personalidad boliviana',d:'Un patito con cariño, sus dichos y su paciencia de altura. 3.640 metros de calma.'},\n          {i:';',t:'Privado de verdad',d:'Lo que le contás a Pollito se queda entre vos y el patito. Sin nubes, sin chismes.'}\n        ],\n        testiKicker:'// testimonios.log', testiTitle:'Le creen a Pollito',\n        testimonials:[\n          {t:'“Llevaba 4 horas con un bug. Se lo expliqué a Pollito y en la línea 3 me callé solo. Era un punto y coma.”',name:'@dev_paceño',role:'Frontend · La Paz'},\n          {t:'“Mi terapeuta y Pollito. Ese es mi stack emocional ahora, pues.”',name:'@imilla.codes',role:'Backend · Cochabamba'},\n          {t:'“Le hablo más a Pollito que a mi equipo. Y me entiende mejor, caserito.”',name:'@santacruz.dev',role:'Fullstack · Santa Cruz'}\n        ],\n        ctaBigTitle:'¿Tenés un bug atorado? Pollito te escucha.',\n        footerTag:'Hecho con harto cariño y 0 dependencias.', footerNote:'pollito.debug() — un homenaje al pato de goma · 2026',\n        whatKicker:'// manual_del_patito.md', whatTitle:'¿Qué es el Rubber Duck Debugging?',\n        whatLead:'Es una técnica real, famosa y comprobada: explicar tu código en voz alta —línea por línea— a un objeto inanimado, como un patito de goma. Al forzarte a verbalizar lo que el código DEBERÍA hacer, tu cerebro nota lo que en realidad HACE. Y ahí cae el bug.',\n        whatOriginTitle:'El origen',\n        whatOrigin:'La historia aparece en el libro “The Pragmatic Programmer” (Andrew Hunt y David Thomas, 1999). Cuenta de un programador que cargaba un patito de goma y se obligaba a explicarle su código línea por línea. La mayoría de las veces, encontraba el error antes de terminar de explicar. No era el pato: era el acto de explicar.',\n        methodTitle:'El método, paso a paso',\n        methodSteps:[\n          {k:'01',t:'Conseguí un patito',d:'De goma, virtual, o uno boliviano llamado Pollito. Cualquiera sirve.'},\n          {k:'02',t:'Explicá tu intención',d:'Decile en voz alta qué se SUPONE que hace este código.'},\n          {k:'03',t:'Leé línea por línea',d:'Ahora recorré el código de verdad, una línea a la vez, explicando cada una.'},\n          {k:'04',t:'Escuchá el silencio',d:'En el momento en que lo que decís no coincide con lo que el código hace… ahí está tu bug.'}\n        ],\n        whyTitle:'¿Por qué funciona?',\n        whyPars:[\n          'Explicar en voz alta usa partes distintas del cerebro que leer en silencio. Te obliga a bajar la velocidad y a cuestionar suposiciones que dabas por ciertas.',\n          'No necesitás que el pato responda. Necesitás escucharte a vos mismo. Pollito solo te acompaña… y de vez en cuando, te tira una pregunta para que sigás.'\n        ],\n        whatCta:'Probá con Pollito ahora',\n        chatStatus:'en línea · modo escucha', chatPlaceholder:'Contale tu bug a Pollito…', chatSend:'Enviar',\n        chatHint:'Pollito no escribe tu código por vos — te ayuda a pensarlo. Esa es la gracia, pues.',\n        chips:['Tengo un bug 🐛','Mi código no corre','Me siento atorado','¡Ya lo resolví!'],\n        blogKicker:'// blog.pollito()', blogTitle:'El nido', blogLead:'Cuentos de bugs, debugging y patitos. Servido con cariño.',\n        blogReadMore:'Leer →', blogBack:'← Volver al nido',\n        articleOutro:'¿Te quedó algún bug rondando? Contámelo, caserito.',\n        readUnit:'min de lectura',\n        posts:[\n          {cat:'HISTORIA',title:'El día que un punto y coma me hizo llorar',excerpt:'4 horas, 1 café frío y un patito que no dijo nada. Crónica de un bug anunciado.',read:5,date:'12 jun 2026',feat:true,\n            body:['Eran las 2 de la mañana. El deploy en 6 horas. Y mi código, que ayer funcionaba perfecto, hoy se reía de mí con un “undefined is not a function”.',\n              'Revisé todo. Googleé. Pregunté en tres chats. Nada. Hasta que, derrotado, abrí el chat de Pollito y empecé a explicarle la función línea por línea, como quien le cuenta un secreto a un amigo.',\n              'En la línea 3 me callé. Ahí estaba. Un punto y coma fuera de lugar, mirándome fijo desde hacía 4 horas. Pollito no dijo nada. No hizo falta. Solo me escuchó hasta que yo mismo lo vi.']},\n          {cat:'TÉCNICA',title:'Cómo explicarle código a un objeto sin sentirte raro',excerpt:'Spoiler: al tercer día ya le ponés nombre y le contás cómo te fue en la daily.',read:4,date:'8 jun 2026',\n            body:['La primera vez se siente ridículo. Estás ahí, hablándole a un patito de goma (o a un dibujo de uno) como si te fuera a contestar.',\n              'El truco es tratarlo como a un colega junior muy educado: no sabe nada de tu proyecto, así que tenés que explicarle TODO desde cero. Esa obligación de no asumir nada es justo lo que destapa el bug.',\n              'Para el tercer día le habrás puesto nombre. Para el quinto, le contarás cómo te fue en la daily. Es normal. Bienvenido al club.']},\n          {cat:'CULTURA',title:'Por qué Pollito es boliviano (y no un pato cualquiera)',excerpt:'Paciencia de altura, dichos con sabor a api y cero apuro. Conocé a tu debugger.',read:3,date:'1 jun 2026',\n            body:['Pollito no es un pato genérico de stock. Tiene acento, tiene dichos y tiene la paciencia de quien vive a 3.640 metros y nada lo apura.',\n              'Te dice “caserito”, te manda a tomar un apicito cuando te frustrás, y celebra tus victorias con un “elay puej” que se siente como un abrazo.',\n              'Porque debuggear no debería ser frío. Debería sentirse como pedirle ayuda a un amigo en una esquina de El Alto: con cariño, con calma y con confianza.']},\n          {cat:'CIENCIA',title:'El efecto de explicar en voz alta, según la ciencia',excerpt:'Se llama “self-explanation effect” y tu patito lo usa sin saber leer un paper.',read:6,date:'24 may 2026',\n            body:['En psicología cognitiva se conoce como “self-explanation effect”: las personas que se explican algo a sí mismas mientras aprenden entienden y retienen mejor que las que solo leen.',\n              'Al verbalizar, tu cerebro detecta los huecos entre lo que crees que sabés y lo que realmente sabés. Esos huecos, en programación, suelen llamarse bugs.',\n              'Pollito no leyó el paper. Pero hace 27 años que los patitos aplican el método. La ciencia solo llegó después a darles la razón.']}\n        ]\n      },\n      en:{\n        nav:{home:'Home', what:'What is it?', chat:'Pollito', blog:'Blog'},\n        heroKicker:'// rubber_duck_debugging.exe',\n        heroTitleA:'Explain your bug to ', heroTitleB:'Pollito.',\n        heroSub:\"Bolivia's most patient debugger duck. You read your code to him line by line… and suddenly, elay, you spot the bug yourself. No judgment, no rush, lots of cariño.\",\n        ctaChat:'Talk to Pollito', ctaWhat:'What is this?',\n        heroBubble:'— And then what happens, pues?',\n        statsLine:'0 dependencies · 100% listening · ∞ patience',\n        howKicker:'// how_it_works()', howTitle:'Three steps. Zero magic.', howSub:'(okay… a tiny bit of magic)',\n        steps:[\n          {k:'01',t:'Tell him your problem',d:'Open the chat and say hi to Pollito. Always online, listening mode on.'},\n          {k:'02',t:'Explain line by line',d:'Read your code out loud, slowly. Pollito asks questions like a curious little caserito.'},\n          {k:'03',t:'Find the bug yourself',d:\"At some point you'll pause and… elay! There it was. Pollito smiles. So do you.\"}\n        ],\n        featKicker:'// why_it_works', featTitle:'A debugger that never rushes you', featSub:\"Pollito doesn't give you the answer. He helps you find it.\",\n        features:[\n          {i:'<\u002F>',t:'Speaks your language',d:'Explain in Spanish, English or pure spanglish. Pollito gets you, caserito.'},\n          {i:'{ }',t:'Zero judgment',d:\"Doesn't matter how ugly your code is. Pollito has seen it all and never laughs… almost never.\"},\n          {i:'[ ]',t:'Socratic method',d:\"Questions that make you think — not spoon-fed answers you won't learn from.\"},\n          {i:'$_',t:'Always around',d:\"3 a.m., deadline looming, cold coffee. Pollito's still there, same patience as ever.\"},\n ,\n          {k:'03',t:'Read line by line',d:'Now walk through the real code, one line at a time, explaining each.'},\n          {k:'04',t:'Listen to the silence',d:\"The moment what you say doesn't match what the code does… there's your bug.\"}\n        ],\n        whyTitle:'Why does it work?',\n        whyPars:[\n          'Speaking out loud uses different parts of the brain than silent reading. It forces you to slow down and question assumptions you took for granted.',\n          \"You don't need the duck to answer. You need to hear yourself. Pollito just keeps you company… and now and then, tosses a question so you keep going.\"\n        ],\n        whatCta:'Try Pollito now',\n        chatStatus:'online · listening mode', chatPlaceholder:'Tell your bug to Pollito…', chatSend:'Send',\n        chatHint:\"Pollito won't write your code for you — he helps you think it through. That's the whole point, pues.\",\n        chips:['I have a bug 🐛',\"My code won't run\",\"I'm stuck\",'I solved it!'],\n        blogKicker:'// blog.pollito()', blogTitle:'The nest', blogLead:'Tales of bugs, debugging and ducks. Served with cariño.',\n        blogReadMore:'Read →', blogBack:'← Back to the nest',\n        articleOutro:'Still got a bug buzzing around? Tell me about it, caserito.',\n        readUnit:'min read',\n        posts:[\n          {cat:'STORY',title:'The day a semicolon made me cry',excerpt:'4 hours, 1 cold coffee and a duck that said nothing. Chronicle of a foretold bug.',read:5,date:'Jun 12, 2026',feat:true,\n            body:[\"It was 2 a.m. Deploy in 6 hours. And my code, which worked perfectly yesterday, was laughing at me today with an “undefined is not a function”.\",\n              'I checked everything. Googled. Asked in three chats. Nothing. Until, defeated, I opened Pollito\\'s chat and started explaining the function line by line, like telling a secret to a friend.',\n              'On line 3 I went quiet. There it was. A misplaced semicolon, staring at me for 4 hours straight. Pollito said nothing. Didn\\'t need to. He just listened until I saw it myself.']},\n          {cat:'TECHNIQUE',title:'How to explain code to an object without feeling weird',excerpt:\"Spoiler: by day three you've named it and you tell it how your daily went.\",read:4,date:'Jun 8, 2026',\n            body:[\"The first time feels ridiculous. There you are, talking to a rubber duck (or a drawing of one) as if it'll answer back.\",\n              'The trick is to treat it like a very polite junior colleague: it knows nothing about your project, so you have to explain EVERYTHING from scratch. That obligation to assume nothing is exactly what uncovers the bug.',\n              \"By day three you'll have named it. By day five, you'll tell it how your daily went. It's normal. Welcome to the club.\"]},\n          {cat:'CULTURE',title:'Why Pollito is Bolivian (and not just any duck)',excerpt:'High-altitude patience, sayings that taste like api, and zero rush. Meet your debugger.',read:3,date:'Jun 1, 2026',\n            body:[\"Pollito isn't a generic stock duck. He has an accent, he has sayings, and the patience of someone who lives at 3,640 meters and is never in a hurry.\",\n              \"He calls you “caserito”, sends you for an api when you get frustrated, and celebrates your wins with an “elay puej” that feels like a hug.\",\n              'Because debugging shouldn\\'t be cold. It should feel like asking a friend for help on a corner in El Alto: with cariño, calm, and trust.']},\n          {cat:'SCIENCE',title:'The out-loud effect, according to science',excerpt:\"It's called the “self-explanation effect” and your duck uses it without reading a single paper.\",read:6,date:'May 24, 2026',\n            body:[\"In cognitive psychology it's known as the “self-explanation effect”: people who explain something to themselves while learning understand and retain better than those who only read.\",\n              'By verbalizing, your brain detects the gaps between what you think you know and what you actually know. In programming, those gaps are usually called bugs.',\n              'Pollito never read the paper. But ducks have applied the method for 27 years. Science just showed up later to prove them right.']}\n        ]\n      },\n      sv:{\n        nav:{home:'Hem', what:'Vad är det?', chat:'Pollito', blog:'Blogg'},\n        heroKicker:'// rubber_duck_debugging.exe',\n        heroTitleA:'Förklara din bugg för ', heroTitleB:'Pollito.',\n        heroSub:'Bolivias tålmodigaste debug-anka. Du läser din kod för honom rad för rad… och plötsligt, elay, ser du buggen själv. Inga domar, ingen stress, massor av cariño.',\n        ctaChat:'Prata med Pollito', ctaWhat:'Vad är det här?',\n        heroBubble:'— Och sen då, pues?',\n        statsLine:'0 beroenden · 100% lyssnande · ∞ tålamod',\n        howKicker:'// hur_det_funkar()', howTitle:'Tre steg. Noll magi.', howSub:'(okej… en liten gnutta magi)',\n        steps:[\n          {k:'01',t:'Berätta om ditt problem',d:'Öppna chatten och hälsa på Pollito. Alltid online, lyssnarläge på.'},\n          {k:'02',t:'Förklara rad för rad',d:'Läs din kod högt, långsamt. Pollito frågar som en nyfiken liten caserito.'},\n          {k:'03',t:'Hitta buggen själv',d:'Vid något tillfälle pausar du och… elay! Där var den. Pollito ler. Det gör du med.'}\n        ],\n        featKicker:'// varför_det_funkar', featTitle:'En debugger som aldrig stressar dig', featSub:'Pollito ger dig inte svaret. Han hjälper dig hitta det.',\n        features:[\n          {i:'<\u002F>',t:'Talar ditt språk',d:'Förklara på spanska, engelska, svenska eller ren spanglish. Pollito förstår dig, caserito.'},\n          {i:'{ }',t:'Noll domar',d:'Det spelar ingen roll hur ful din kod är. Pollito har sett allt och skrattar aldrig… nästan aldrig.'},\n          {i:'[ ]',t:'Sokratisk metod',d:'Frågor som får dig att tänka — inte färdigtuggade svar du inte lär dig nåt av.'},\n          {i:'$_',t:'Alltid där',d:'Kl 03, deadline wArticle:route==='blog' && !!art, notChat:route!=='chat',\n      posts, featured, restPosts,\n      article:art, articleBody: art ? art.body : [],\n      chatMessages, typing:this.state.typing, chips,\n      input:this.state.input, msgsRef:this.msgsRef,\n      onInput:(e)=>this.setState({input:e.target.value}),\n      onKey:(e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); this.userSend(this.state.input); } },\n      send:()=>this.userSend(this.state.input),\n      closeArticle:()=>this.setState({article:null})\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
